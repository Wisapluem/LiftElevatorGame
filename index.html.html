<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lift Elevator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0f1e;--surface:#111827;--surface2:#1a2438;
  --accent:#00e5ff;--accent2:#ff6b35;--accent3:#a8ff3e;
  --text:#e8eaf6;--text2:#8892b0;
  --lA:#1e88e5;--lB:#7b1fa2;--lC:#e65100;
}
body{background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;height:100vh;overflow:hidden;user-select:none;display:flex;flex-direction:column}

/* ── TOPBAR ── */
#topbar{display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:var(--surface);border-bottom:1px solid rgba(0,229,255,.18);height:50px;flex-shrink:0}
.tb-title{font-size:12px;letter-spacing:.2em;color:var(--accent)}
.timer{font-size:22px;font-weight:700;color:var(--accent3);font-variant-numeric:tabular-nums}
.timer.urgent{color:#ff4444;animation:pulse .5s infinite alternate}
@keyframes pulse{from{opacity:1}to{opacity:.4}}
.phase-lbl{font-size:10px;letter-spacing:.1em;color:var(--text2);text-align:center}
.score{font-size:11px;color:var(--text2);text-align:right}
.score b{color:var(--accent)}
#pbar-wrap{height:3px;background:rgba(255,255,255,.08);flex-shrink:0}
#pbar{height:100%;background:var(--accent3);transition:width 1s linear;width:100%}

/* ══ MAIN LAYOUT ══ */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}

/* ── ROW 1: BUILDING VIEW (top, taller) ── */
#bld-zone{flex:3;position:relative;overflow:hidden;background:var(--surface);border-bottom:2px solid rgba(255,255,255,.1);min-height:0}
#bld-floors{position:absolute;inset:0;display:flex;flex-direction:column-reverse}
.bld-row{display:flex;align-items:center;border-top:1px solid rgba(255,255,255,.05);flex-shrink:0}
.bld-row.fl1{background:rgba(0,229,255,.04)}
.bld-fl-num{width:24px;font-size:8px;color:rgba(255,255,255,.22);text-align:right;padding-right:5px;flex-shrink:0}
.bld-fl-content{flex:1;height:100%;position:relative;display:flex;align-items:center;gap:2px;padding-left:4px;overflow:hidden}
.delivered-char{font-size:16px;animation:charArrive .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes charArrive{from{transform:translateY(-14px) scale(0);opacity:0}to{transform:none;opacity:1}}
/* shafts sit flush right, width set by JS to match lift slots */
#lift-shafts{position:absolute;top:0;right:0;bottom:0;display:flex;pointer-events:none}
.shaft-col{position:relative;border-left:1px solid rgba(255,255,255,.08)}
.lcar{position:absolute;left:4px;right:4px;border-radius:5px;border:2px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:2px;z-index:5;overflow:hidden}
.lcar.lA{border-color:var(--lA);background:rgba(30,136,229,.2)}
.lcar.lB{border-color:var(--lB);background:rgba(123,31,162,.2)}
.lcar.lC{border-color:var(--lC);background:rgba(230,81,0,.2)}
.lcar.door-open{box-shadow:0 0 10px currentColor}
.lcar-lbl{font-size:7px;font-weight:700;letter-spacing:.1em}
.lcar.lA .lcar-lbl{color:var(--lA)}.lcar.lB .lcar-lbl{color:var(--lB)}.lcar.lC .lcar-lbl{color:var(--lC)}
.lcar-pax{font-size:10px;display:flex;flex-wrap:wrap;justify-content:center;gap:1px;line-height:1}
.shaft-dot{position:absolute;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.1)}
.shaft-dot.lit{background:var(--accent3);box-shadow:0 0 4px var(--accent3)}
.shaft-range{position:absolute;left:2px;width:3px;border-radius:2px;opacity:.3}
.shaft-range.lA{background:var(--lA)}.shaft-range.lB{background:var(--lB)}.shaft-range.lC{background:var(--lC)}

/* ── ROW 2: LOBBY (left) + LIFT SLOTS (right) ── */
#bottom-zone{flex:2;display:flex;overflow:hidden;min-height:0}

/* LOBBY — left column, 50% width */
#lobby-zone{flex:1;background:var(--surface);border-right:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;overflow:hidden}
.zone-hdr{padding:5px 10px;font-size:10px;letter-spacing:.12em;color:var(--text2);border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.zone-hdr-hint{font-size:9px;color:var(--text2);opacity:.55}
#lobby-chars{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px 8px;display:flex;flex-wrap:wrap;gap:5px;align-content:flex-start}
#lobby-chars::-webkit-scrollbar{width:3px}
#lobby-chars::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1)}
.char-card{width:52px;height:62px;background:var(--surface2);border:2px solid rgba(255,255,255,.1);border-radius:6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:3px;position:relative;transition:border-color .15s,transform .1s;flex-shrink:0;animation:cpop .18s ease-out}
@keyframes cpop{from{transform:scale(0)}to{transform:scale(1)}}
.char-card:hover{border-color:rgba(0,229,255,.5);transform:scale(1.06)}
.char-card.sel{border-color:var(--accent);background:rgba(0,229,255,.08)}
.char-card.wrong-wait{border-color:rgba(255,200,0,.6)!important}
.floor-badge{position:absolute;top:3px;right:3px;font-size:9px;font-weight:700;background:var(--accent2);color:#fff;border-radius:3px;padding:1px 3px;line-height:1.4}
.floor-badge.warn{background:#ffd600;color:#000}
.char-body{font-size:22px;line-height:1}
.char-nm{font-size:7px;color:var(--text2)}

/* LIFT ZONE — right column, 50% width */
#lift-zone{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#lift-slots{display:flex;gap:1px;background:rgba(255,255,255,.04);flex:1;min-height:0}
.lift-slot{flex:1;background:var(--surface);display:flex;flex-direction:column;overflow:hidden;border-right:1px solid rgba(255,255,255,.04)}
.lift-slot:last-child{border-right:none}
.lift-hdr{padding:6px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0}
.lift-lbl{font-size:10px;font-weight:700;letter-spacing:.15em}
.lift-range{font-size:9px;color:var(--text2)}
.lift-cap{font-size:10px;color:var(--text2)}
.lA .lift-lbl{color:var(--lA)}.lB .lift-lbl{color:var(--lB)}.lC .lift-lbl{color:var(--lC)}
.lift-pass{flex:1;padding:5px;display:flex;flex-wrap:wrap;gap:3px;align-content:flex-start;overflow-y:auto;cursor:pointer}
.lift-pass::-webkit-scrollbar{width:3px}
.pass-chip{display:flex;align-items:center;gap:3px;background:var(--surface2);border:1px solid rgba(255,255,255,.1);border-radius:4px;padding:2px 5px;font-size:10px;cursor:pointer;transition:background .12s}
.pass-chip:hover{background:rgba(255,80,80,.15);border-color:rgba(255,80,80,.4)}
.pass-chip .fn{color:var(--accent2);font-weight:700}
.pass-chip.wrong{border-color:rgba(255,200,0,.45)!important;background:rgba(255,200,0,.07)!important}
.pass-chip.wrong .fn{color:#ffd600!important}
#lift-actions{padding:7px 10px;display:flex;gap:6px;border-top:1px solid rgba(255,255,255,.06);flex-shrink:0}
.send-lift-btn{flex:1;padding:8px 4px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.1em;border:2px solid;cursor:pointer;text-transform:uppercase;transition:all .2s;background:transparent;line-height:1.3}
#send-btn-0{border-color:var(--lA);color:var(--lA)}
#send-btn-0:hover:not(:disabled){background:var(--lA);color:#fff}
#send-btn-1{border-color:var(--lB);color:var(--lB)}
#send-btn-1:hover:not(:disabled){background:var(--lB);color:#fff}
#send-btn-2{border-color:var(--lC);color:var(--lC)}
#send-btn-2:hover:not(:disabled){background:var(--lC);color:#fff}
.send-lift-btn:disabled{opacity:.25;cursor:not-allowed}

/* ── STATUS BAR (replaces s2-bar) ── */
#status-bar{padding:6px 14px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--surface);font-size:10px;color:var(--text2);min-height:32px}
#status-bar b{color:var(--accent)}
#status-bar.animating{border-top-color:rgba(0,229,255,.3)}

/* ── TITLE SCREEN ── */
#title-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);z-index:100;transition:opacity .3s}
#title-screen.hidden{opacity:0;pointer-events:none}
.game-title{font-size:clamp(28px,5vw,58px);font-weight:700;letter-spacing:.15em;color:var(--accent);text-shadow:0 0 28px rgba(0,229,255,.35);margin-bottom:.2em}
.game-sub{font-size:12px;color:var(--text2);letter-spacing:.3em;margin-bottom:2.5em}
.btn{padding:11px 32px;border:2px solid var(--accent);background:transparent;color:var(--accent);font-family:'Space Mono',monospace;font-size:13px;letter-spacing:.15em;cursor:pointer;transition:all .2s;text-transform:uppercase}
.btn:hover{background:var(--accent);color:var(--bg)}
.btn-g{border-color:var(--accent3);color:var(--accent3)}.btn-g:hover{background:var(--accent3);color:var(--bg)}
.how-to{margin-top:20px;font-size:11px;color:var(--text2);max-width:340px;text-align:center;line-height:2}

/* ── END OVERLAY ── */
#end-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:flex;align-items:center;justify-content:center}
#end-overlay.hidden{display:none}
.end-box{background:var(--surface);border:1px solid rgba(0,229,255,.25);padding:30px 38px;text-align:center;max-width:400px;width:90%}
.end-title{font-size:24px;font-weight:700;margin-bottom:6px}
.end-sub{font-size:11px;color:var(--text2);margin-bottom:18px;line-height:1.9}
.end-stat{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.07);font-size:11px}
.end-stat:last-of-type{border-bottom:none}
.end-val{color:var(--accent);font-weight:700}
.end-btns{margin-top:20px;display:flex;gap:10px;justify-content:center}

/* ── TOAST ── */
#toast{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid rgba(0,229,255,.25);padding:6px 16px;font-size:11px;color:var(--accent);z-index:300;pointer-events:none;opacity:0;transition:opacity .25s;white-space:nowrap}
#toast.show{opacity:1}
</style>
</head>
<body>

<!-- TITLE -->
<div id="title-screen">
  <div class="game-title">LIFT ELEVATOR</div>
  <div class="game-sub">TIME MANAGEMENT PUZZLE</div>
  <button class="btn" onclick="startGame()">▶ START GAME</button>
  <div class="how-to">คลิกตัวละคร → คลิกลิฟต์ → กด SEND LIFTS<br>ส่งพนักงานทุกคนถึงชั้นตัวเองภายใน <b style="color:var(--accent3)">1 นาที</b></div>
</div>

<!-- TOPBAR -->
<div id="topbar">
  <div class="tb-title">🏢 LIFT ELEVATOR</div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:1px">
    <div class="timer" id="main-timer">1:00</div>
    <div class="phase-lbl" id="main-phase">ASSIGN PHASE</div>
  </div>
  <div class="score">Delivered <b id="del-count">0</b> / <b id="tot-count">0</b></div>
</div>
<div id="pbar-wrap"><div id="pbar"></div></div>

<!-- MAIN -->
<div id="main">

  <!-- ROW 1: BUILDING VIEW -->
  <div id="bld-zone">
    <div id="bld-floors"></div>
    <div id="lift-shafts"></div>
  </div>

  <!-- ROW 2: LOBBY (left) + LIFT SLOTS (right) -->
  <div id="bottom-zone">
    <div id="lobby-zone">
      <div class="zone-hdr">
        <span>🚶 LOBBY FL1</span>
        <span class="zone-hdr-hint">คลิก → ลิฟต์</span>
      </div>
      <div id="lobby-chars"></div>
    </div>

    <div id="lift-zone">
      <div id="lift-slots">
        <div class="lift-slot lA">
          <div class="lift-hdr"><div><div class="lift-lbl">LIFT A</div><div class="lift-range" id="lr-0"></div></div><div class="lift-cap" id="lc-0">0/10</div></div>
          <div class="lift-pass" id="lp-0" onclick="liftClick(0)"></div>
        </div>
        <div class="lift-slot lB">
          <div class="lift-hdr"><div><div class="lift-lbl">LIFT B</div><div class="lift-range" id="lr-1"></div></div><div class="lift-cap" id="lc-1">0/10</div></div>
          <div class="lift-pass" id="lp-1" onclick="liftClick(1)"></div>
        </div>
        <div class="lift-slot lC">
          <div class="lift-hdr"><div><div class="lift-lbl">LIFT C</div><div class="lift-range" id="lr-2"></div></div><div class="lift-cap" id="lc-2">0/10</div></div>
          <div class="lift-pass" id="lp-2" onclick="liftClick(2)"></div>
        </div>
      </div>
      <div id="lift-actions">
        <button class="send-lift-btn" id="send-btn-0" onclick="sendOneLift(0)" disabled>Send</button>
        <button class="send-lift-btn" id="send-btn-1" onclick="sendOneLift(1)" disabled>Send</button>
        <button class="send-lift-btn" id="send-btn-2" onclick="sendOneLift(2)" disabled>Send</button>
      </div>
    </div>
  </div>

</div>

<!-- STATUS BAR -->
<div id="status-bar">
  <span id="status-msg">เลือกตัวละครและ assign เข้าลิฟต์</span>
  <span id="status-right"></span>
</div>

<!-- END OVERLAY -->
<div id="end-overlay" class="hidden">
  <div class="end-box">
    <div class="end-title" id="end-title"></div>
    <div class="end-sub" id="end-sub"></div>
    <div id="end-stats"></div>
    <div class="end-btns">
      <button class="btn btn-g" onclick="startGame()">PLAY AGAIN</button>
      <button class="btn" onclick="showTitle()">MAIN MENU</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
// ══ CONSTANTS ══
const TOTAL_FLOORS = 8;
const TOTAL_CHARS  = 10;
const GAME_TIME    = 60;
const MAX_CAP      = 10;
const MS_PER_FLOOR = 1000;
const MS_STOP      = 1000;

// ══ STATE ══
let CFG=[], chars=[], passengers=[[],[],[]], selChar=null;
let gTimer=null, timeLeft=GAME_TIME, delivered=0, phase='assign';
let liftMoving=[false,false,false]; // track per-lift animation state

// ══ UTILS ══
const rand=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const delay=ms=>new Promise(r=>setTimeout(r,ms));
const fmtT=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;

function genCFG(){
  const c1=rand(2,4),c2=rand(c1+1,7);
  return[
    {min:2,max:c1,label:'A',cls:'lA',color:'var(--lA)'},
    {min:c1,max:c2,label:'B',cls:'lB',color:'var(--lB)'},
    {min:c2,max:8, label:'C',cls:'lC',color:'var(--lC)'},
  ];
}
const EM_M=['👨‍💼','👨‍💻','🧑‍💼','👨‍🔬','👨‍🏫','👨‍⚕️'];
const EM_F=['👩‍💼','👩‍💻','🧑‍💼','👩‍🔬','👩‍🏫','👩‍⚕️'];
function genChars(){
  return Array.from({length:TOTAL_CHARS},(_,i)=>({
    id:i, floor:rand(2,TOTAL_FLOORS),
    emoji:(i%2?EM_M:EM_F)[rand(0,5)],
    name:`E${String(i+1).padStart(2,'0')}`,
    delivered:false, inLift:-1, waiting:false
  }));
}

// ══ TITLE ══
function showTitle(){
  clearInterval(gTimer);
  document.getElementById('end-overlay').classList.add('hidden');
  document.getElementById('title-screen').classList.remove('hidden');
}

// ══ START ══
function startGame(){
  document.getElementById('title-screen').classList.add('hidden');
  CFG=genCFG(); chars=genChars(); passengers=[[],[],[]]; selChar=null;
  timeLeft=GAME_TIME; delivered=0; phase='assign'; liftMoving=[false,false,false];
  document.getElementById('end-overlay').classList.add('hidden');
  document.getElementById('del-count').textContent=0;
  document.getElementById('tot-count').textContent=TOTAL_CHARS;
  CFG.forEach((c,i)=>document.getElementById(`lr-${i}`).textContent=`FL ${c.min}–${c.max}`);
  document.getElementById('main-timer').textContent='1:00';
  document.getElementById('main-timer').classList.remove('urgent');
  document.getElementById('main-phase').textContent='ASSIGN PHASE';
  document.getElementById('pbar').style.width='100%';
  document.getElementById('status-msg').textContent='เลือกตัวละครและ assign เข้าลิฟต์';
  document.getElementById('status-right').textContent='';
  renderLobby(); renderLifts(); updateSendBtn();
  buildBldView();
  clearInterval(gTimer);
  gTimer=setInterval(tick,1000);
}

// ══ TIMER ══
function tick(){
  if(phase==='end')return;
  timeLeft--;
  const txt=fmtT(timeLeft),urg=timeLeft<=15;
  document.getElementById('main-timer').textContent=txt;
  document.getElementById('main-timer').classList.toggle('urgent',urg);
  document.getElementById('pbar').style.width=(timeLeft/GAME_TIME*100)+'%';
  if(timeLeft<=0&&phase==='assign'){clearInterval(gTimer);triggerEnd(false,'หมดเวลา!');}
}

// ══ ASSIGN LOGIC ══
function renderLobby(){
  const el=document.getElementById('lobby-chars'); el.innerHTML='';
  chars.forEach(c=>{
    if(c.delivered||c.inLift>=0)return;
    const d=document.createElement('div');
    d.className='char-card'+(selChar===c.id?' sel':'')+(c.waiting?' wrong-wait':'');
    d.innerHTML=`<div class="floor-badge${c.waiting?' warn':''}">${c.floor}</div><div class="char-body">${c.emoji}</div><div class="char-nm">${c.name}</div>`;
    d.onclick=()=>pickChar(c.id); el.appendChild(d);
  });
}
function renderLifts(){
  for(let i=0;i<3;i++){
    const p=document.getElementById(`lp-${i}`); p.innerHTML='';
    const moving=liftMoving[i];
    document.getElementById(`lc-${i}`).textContent=moving?'🔺 MOVING':`${passengers[i].length}/10`;
    if(!moving){
      passengers[i].forEach(cid=>{
        const c=chars.find(x=>x.id===cid); if(!c)return;
        const wrong=c.floor<CFG[i].min||c.floor>CFG[i].max;
        const chip=document.createElement('div');
        chip.className='pass-chip'+(wrong?' wrong':'');
        chip.innerHTML=`<span>${c.emoji}</span><span class="fn">${c.floor}</span>`;
        chip.onclick=e=>{e.stopPropagation();removePax(cid,i)}; p.appendChild(chip);
      });
    }
  }
  updateSendBtn();
}
function pickChar(id){
  if(phase!=='assign')return;
  const c=chars.find(x=>x.id===id);
  if(!c||c.delivered||c.inLift>=0)return;
  selChar=(selChar===id)?null:id; renderLobby();
  if(selChar!==null) toast(`${c.emoji} FL${c.floor} → คลิกลิฟต์`);
}
function liftClick(i){
  if(phase!=='assign')return;
  if(liftMoving[i]){toast(`LIFT ${CFG[i].label} กำลังเคลื่อนที่ รอให้กลับ FL1 ก่อน`);return;}
  if(selChar===null){toast('กรุณาเลือกตัวละครก่อน');return;}
  if(passengers[i].length>=MAX_CAP){toast(`LIFT ${CFG[i].label} เต็ม`);return;}
  const c=chars.find(x=>x.id===selChar); if(!c)return;
  c.inLift=i; c.waiting=false; passengers[i].push(selChar); selChar=null;
  renderLobby(); renderLifts();
}
function removePax(cid,i){
  if(liftMoving[i])return;
  passengers[i]=passengers[i].filter(x=>x!==cid);
  const c=chars.find(x=>x.id===cid); if(c){c.inLift=-1;c.waiting=false;}
  renderLobby(); renderLifts();
}
function updateSendBtn(){
  document.getElementById('send-btn').disabled=(passengers.reduce((s,a)=>s+a.length,0)===0||phase!=='assign');
}

function updateSendBtn(){
  for(let i=0;i<3;i++){
    const btn=document.getElementById(`send-btn-${i}`);
    if(btn) btn.disabled=(passengers[i].length===0||liftMoving[i]);
  }
}

// send a single lift
async function sendOneLift(li){
  if(liftMoving[li])return;
  if(passengers[li].length===0){toast(`LIFT ${CFG[li].label} ไม่มีผู้โดยสาร`);return;}
  liftMoving[li]=true;
  const btn=document.getElementById(`send-btn-${li}`);
  if(btn) btn.disabled=true;
  document.getElementById(`lp-${li}`).innerHTML='';
  document.getElementById(`lc-${li}`).textContent='0/10';
  document.getElementById('main-phase').textContent='LIFT MOVING';
  const pass=[...passengers[li]];
  await animLift(li, pass);
  liftMoving[li]=false;
  onAnimDone();
}

// ══ BUILDING VIEW ══
let FH=0;

function buildBldView(){
  const zone=document.getElementById('bld-zone');
  FH=zone.clientHeight/TOTAL_FLOORS;

  // measure each lift slot's actual width for shaft alignment
  const slotWidths=CFG.map((_,i)=>{
    const slot=document.getElementById(`lp-${i}`)?.closest('.lift-slot');
    return slot ? slot.getBoundingClientRect().width : zone.clientWidth/3;
  });

  // floors
  const bldFloors=document.getElementById('bld-floors'); bldFloors.innerHTML='';
  const shaftsTotalW=slotWidths.reduce((s,w)=>s+w,0);
  for(let f=1;f<=TOTAL_FLOORS;f++){
    const row=document.createElement('div');
    row.className='bld-row'+(f===1?' fl1':'');
    row.style.height=FH+'px'; row.id=`fr-${f}`;
    row.innerHTML=`<div class="bld-fl-num">${f}</div><div class="bld-fl-content" id="fc-${f}" style="margin-right:${shaftsTotalW}px"></div>`;
    bldFloors.appendChild(row);
  }

  // shafts — each column width matches the corresponding lift slot
  const shafts=document.getElementById('lift-shafts'); shafts.innerHTML='';
  CFG.forEach((cfg,i)=>{
    const w=slotWidths[i];
    const col=document.createElement('div');
    col.className='shaft-col'; col.id=`sc-${i}`;
    col.style.width=w+'px';
    // range bracket
    const br=document.createElement('div');
    br.className=`shaft-range ${cfg.cls}`;
    br.style.cssText=`bottom:${(cfg.min-1)*FH}px;height:${(cfg.max-cfg.min+1)*FH}px`;
    col.appendChild(br);
    // dots
    for(let f=2;f<=TOTAL_FLOORS;f++){
      const dot=document.createElement('div');
      dot.className='shaft-dot'; dot.id=`dot-${i}-${f}`;
      dot.style.bottom=(f-1)*FH+FH/2-2+'px';
      col.appendChild(dot);
    }
    // car
    const carH=Math.max(FH*0.8,28);
    const car=document.createElement('div');
    car.className=`lcar ${cfg.cls}`; car.id=`lcar-${i}`;
    car.style.cssText=`bottom:3px;height:${carH}px;transition:none`;
    const paxHtml=passengers[i].map(cid=>{const c=chars.find(x=>x.id===cid);return c?`<span>${c.emoji}</span>`:''}).join('');
    car.innerHTML=`<div class="lcar-lbl">${cfg.label}</div><div class="lcar-pax" id="cpax-${i}">${paxHtml}</div>`;
    col.appendChild(car); shafts.appendChild(col);
  });
}

function carBottom(floor){return(floor-1)*FH+3;}
function setCar(li,floor,ms){
  const car=document.getElementById(`lcar-${li}`); if(!car)return;
  car.style.transition=ms>0?`bottom ${ms}ms linear`:'none';
  car.style.bottom=carBottom(floor)+'px';
}
function updateCarPax(li){
  const el=document.getElementById(`cpax-${li}`); if(!el)return;
  el.innerHTML=passengers[li].map(cid=>{const c=chars.find(x=>x.id===cid);return c?`<span>${c.emoji}</span>`:''}).join('');
}
function litDot(li,f,on){const d=document.getElementById(`dot-${li}-${f}`);if(d)d.classList.toggle('lit',on);}
function placeDelivered(c){
  const fc=document.getElementById(`fc-${c.floor}`); if(!fc)return;
  const s=document.createElement('span');
  s.className='delivered-char'; s.textContent=c.emoji; fc.appendChild(s);
}

// ══ ANIMATION ══
async function animLift(li,pass){
  const cfg=CFG[li];
  const correct=pass.filter(cid=>{const c=chars.find(x=>x.id===cid);return c&&c.floor>=cfg.min&&c.floor<=cfg.max});
  const wrong=pass.filter(cid=>!correct.includes(cid));
  const stops=[...new Set(correct.map(cid=>chars.find(x=>x.id===cid).floor))].sort((a,b)=>a-b);
  const topFloor=stops.length>0?stops[stops.length-1]:cfg.max;
  let cur=1;

  // go up floor by floor
  for(let f=2;f<=topFloor;f++){
    setCar(li,f,MS_PER_FLOOR); litDot(li,f,true);
    await delay(MS_PER_FLOOR); cur=f;
    const alighting=correct.filter(cid=>{const c=chars.find(x=>x.id===cid);return c&&c.floor===f;});
    if(alighting.length>0){
      const car=document.getElementById(`lcar-${li}`);
      if(car) car.classList.add('door-open');
      for(const cid of alighting){
        const c=chars.find(x=>x.id===cid); if(!c)continue;
        c.delivered=true; c.inLift=-1; delivered++;
        passengers[li]=passengers[li].filter(x=>x!==cid);
        updateCarPax(li); placeDelivered(c);
        document.getElementById('del-count').textContent=delivered;
        await delay(MS_STOP+50);
      }
      if(car) car.classList.remove('door-open');
    }
    litDot(li,f,false);
  }

  // return down floor by floor
  for(let f=cur-1;f>=1;f--){
    setCar(li,f,MS_PER_FLOOR);
    await delay(MS_PER_FLOOR); cur=f;
  }

  // release wrong passengers
  wrong.forEach(cid=>{const c=chars.find(x=>x.id===cid);if(c){c.inLift=-1;c.waiting=true;}});
  passengers[li]=[];
}

function onAnimDone(){
  if(phase==='end')return;
  const allDone=chars.every(c=>c.delivered);
  if(allDone){triggerEnd(true);return;}
  if(timeLeft<=0){triggerEnd(false,'หมดเวลา!');return;}

  document.getElementById('main-phase').textContent='ASSIGN PHASE';
  const remaining=chars.filter(c=>!c.delivered);
  const waiters=chars.filter(c=>c.waiting&&!c.delivered);
  document.getElementById('status-msg').innerHTML=`เหลือ <b>${remaining.length}</b> คน`;
  document.getElementById('status-right').innerHTML=waiters.length>0?`<span style="color:#ffd600">${waiters.length} คนรอ assign ใหม่</span>`:'';
  renderLobby(); renderLifts(); updateSendBtn();
}

// ══ END ══
function triggerEnd(win,reason=''){
  if(phase==='end')return;
  phase='end'; clearInterval(gTimer);
  setTimeout(()=>{
    document.getElementById('end-overlay').classList.remove('hidden');
    const t=document.getElementById('end-title');
    t.textContent=win?'🎉 MISSION COMPLETE':'❌ GAME OVER';
    t.style.color=win?'var(--accent3)':'#ff4444';
    document.getElementById('end-sub').textContent=win?'ส่งพนักงานถึงที่หมายครบทุกคน!':reason;
    document.getElementById('end-stats').innerHTML=`
      <div class="end-stat"><span>Delivered</span><span class="end-val">${delivered} / ${TOTAL_CHARS}</span></div>
      <div class="end-stat"><span>Time used</span><span class="end-val">${fmtT(GAME_TIME-timeLeft)} / 1:00</span></div>
      <div class="end-stat"><span>Remaining</span><span class="end-val">${chars.filter(c=>!c.delivered).length} คน</span></div>`;
  },400);
}

// ══ TOAST ══
let toastT=null;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),2200);
}
</script>
